<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Couple iMessage 💜</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont;
}

body{
height:100vh;
background:linear-gradient(180deg,#000,#0a0a0a);
color:white;
overflow:hidden;
}

/* HEADER */
.top{
padding:14px;
text-align:center;
font-weight:700;
font-size:18px;
background:rgba(20,20,20,0.6);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* SETUP */
.setup{
display:flex;
flex-direction:column;
gap:10px;
padding:20px;
}

input{
padding:14px;
border:none;
border-radius:18px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
backdrop-filter:blur(10px);
}

button{
padding:14px;
border:none;
border-radius:18px;
background:#0A84FF;
color:white;
font-weight:600;
}

/* CHAT */
#chat{
display:none;
flex-direction:column;
height:100%;
}

.messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

/* BUBBLES */
.msg{
max-width:75%;
padding:10px 14px;
border-radius:20px;
font-size:15px;
animation:pop .25s ease;
backdrop-filter:blur(10px);
}

.mine{
align-self:flex-end;
background:linear-gradient(135deg,#0A84FF,#4DA3FF);
}

.theirs{
align-self:flex-start;
background:rgba(255,255,255,0.08);
}

/* animation */
@keyframes pop{
from{transform:translateY(10px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

/* INPUT BAR */
.bottom{
display:flex;
padding:10px;
gap:10px;
background:rgba(20,20,20,0.6);
backdrop-filter:blur(15px);
}

.bottom input{
flex:1;
border-radius:20px;
}

.bottom button{
width:60px;
border-radius:20px;
}

/* ROOM TEXT */
.room{
text-align:center;
font-size:12px;
opacity:0.6;
padding:6px;
}

/* typing */
#typing{
font-size:12px;
opacity:0.6;
padding-left:15px;
height:18px;
}
</style>
</head>

<body>

<div class="top">💜 Couple iMessage</div>

<div class="setup">
<input id="name" placeholder="Your name">
<button onclick="createRoom()">Create Room</button>
<input id="joinCode" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>
</div>

<div id="chat">

<div class="room" id="roomText"></div>

<div class="messages" id="messages"></div>

<div id="typing"></div>

<div class="bottom">
<input id="message" placeholder="iMessage..." oninput="typing()">
<button onclick="sendMsg()">↑</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDgJS40gn_X8IACTCpgA4DT_3kC9T6oNxM",
authDomain: "yoooo-85eb6.firebaseapp.com",
databaseURL: "https://yoooo-85eb6-default-rtdb.firebaseio.com",
projectId: "yoooo-85eb6",
storageBucket: "yoooo-85eb6.appspot.com",
messagingSenderId: "837218315446",
appId: "1:837218315446:web:443d6dc3417e78706b4a17"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room="", user="";
let msgRef;

window.createRoom = () => {
user = name.value || "Player1";
room = Math.random().toString(36).substring(2,8);
start();
};

window.joinRoom = () => {
user = name.value || "Player2";
room = joinCode.value;
start();
};

function start(){
document.querySelector(".setup").style.display="none";
chat.style.display="flex";
roomText.innerText="Room: "+room;

msgRef = ref(db,"rooms/"+room);

onChildAdded(msgRef,(snap)=>{
const d = snap.val();
addMsg(d.name,d.text,d.name===user);
});

}

window.sendMsg = () => {
if(!message.value) return;

push(msgRef,{
name:user,
text:message.value
});

message.value="";
setTyping(false);
};

function addMsg(name,text,mine){
const div=document.createElement("div");
div.className="msg "+(mine?"mine":"theirs");
div.innerHTML=`<b>${name}</b><br>${text}`;
messages.appendChild(div);
messages.scrollTop=999999;
}

/* typing system (simple fake realtime feel) */
let typingTimeout;

window.typing = () => {
setTyping(true);
clearTimeout(typingTimeout);
typingTimeout = setTimeout(()=>setTyping(false),800);
};

function setTyping(state){
set(ref(db,"rooms/"+room+"/typing"),{
user:state?user:""
});
}

/* listen typing */
setInterval(()=>{
if(!room) return;
onChildAdded(ref(db,"rooms/"+room),(s)=>{});
},2000);

</script>

</body>
</html>
