<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Couple Hub 💜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system}
html,body{height:100%}
body{
background:#000;color:#fff;
height:100dvh;
padding-bottom:env(safe-area-inset-bottom);
overflow:hidden;
}
.screen{
display:none;
height:calc(100dvh - env(safe-area-inset-bottom));
}
.active{display:flex;flex-direction:column}
.wrap{padding:16px;gap:10px;display:flex;flex-direction:column}
input,button{
padding:15px;border:none;border-radius:18px;font-size:16px
}
input{background:#171717;color:#fff}
button{background:#0A84FF;color:#fff}
.wait{
flex:1;display:flex;justify-content:center;
align-items:center;flex-direction:column;gap:14px
}
.bear{
font-size:88px;
animation:dance 1s infinite;
}
@keyframes dance{
0%{transform:rotate(-8deg)}
50%{transform:rotate(8deg) translateY(-8px)}
100%{transform:rotate(-8deg)}
}
.code{font-size:34px;font-weight:700}
.grid{
padding:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
overflow:auto;
}
.card{
background:#171717;
padding:18px;
border-radius:18px;
text-align:center;
}
.chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}
.msg{
padding:10px;
border-radius:18px;
max-width:75%;
}
.mine{
background:#0A84FF;
align-self:flex-end;
}
.other{
background:#222;
}
.bottom{
display:flex;
gap:8px;
padding:10px;
}
.bottom input{flex:1}
.game{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:14px;
padding:20px;
text-align:center;
}
</style>
</head>
<body>
<div id="home" class="screen active">
<div class="wrap">
<input id="name" placeholder="Your name">
<button onclick="createRoom()">
Create Room
</button>
<input id="joinCode"
placeholder="Room Code">
<button onclick="joinRoom()">
Join Room
</button>
</div>
</div>
<div id="wait" class="screen">
<div class="wait">
<div class="bear">🧸</div>
<div>Waiting for partner…</div>
<div id="roomCode" class="code"></div>
</div>
</div>
<div id="hub" class="screen">
<div class="grid">
<div class="card" onclick="openGame('chatScreen')">
💬 Chat
</div>
<div class="card" onclick="openGame('tapScreen')">
❤️ Tap Battle
</div>
<div class="card" onclick="openGame('quizScreen')">
🧠 Quiz
</div>
<div class="card" onclick="openGame('truthScreen')">
🎲 Truth
</div>
<div class="card">
🎨 Draw (soon)
</div>
<div class="card">
❌⭕ Tic Tac Toe (soon)
</div>
<div class="card">
💘 Would You Rather
</div>
<div class="card">
🔥 Never Have I Ever
</div>
</div>
</div>
<div id="chatScreen" class="screen">
<div id="messages" class="chat"></div>
<div class="bottom">
<input id="msg">
<button onclick="sendMsg()">↑</button>
<button onclick="back()">←</button>
</div>
</div>
<div id="tapScreen" class="screen">
<div class="game">
<h1>❤️</h1>
<div id="score">0</div>
<button onclick="tap()">TAP</button>
<button onclick="back()">Exit</button>
</div>
</div>
<div id="quizScreen" class="screen">
<div class="game">
<div id="quiz">Who fell first?</div>
<button onclick="nextQuiz()">Next</button>
<button onclick="back()">Exit</button>
</div>
</div>
<div id="truthScreen" class="screen">
<div class="game">
<div id="truth">Tap next</div>
<button onclick="nextTruth()">Next</button>
<button onclick="back()">Exit</button>
</div>
</div>
<script type="module">
import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
getDatabase,
ref,
set,
get,
push,
onChildAdded
}
from
"https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
/* YOUR FIREBASE */
const firebaseConfig={
apiKey:
"AIzaSyDgJS40gn_X8IACTCpgA4DT_3kC9T6oNxM",
authDomain:
"yoooo-85eb6.firebaseapp.com",
databaseURL:
"https://yoooo-85eb6-default-rtdb.firebaseio.com",
projectId:
"yoooo-85eb6",
storageBucket:
"yoooo-85eb6.appspot.com",
messagingSenderId:
"837218315446",
appId:
"1:837218315446:web:443d6dc3417e78706b4a17"
};
const app=
initializeApp(firebaseConfig);
const db=
getDatabase(app);
let room="";
let username="";
function show(id){
document
.querySelectorAll(".screen")
.forEach(
x=>x.classList.remove("active")
);
document
.getElementById(id)
.classList.add("active");
}
window.createRoom=
async()=>{
username=
name.value||"Player";
room=
Math.random()
.toString(36)
.substring(2,7)
.toUpperCase();
await set(
ref(db,"rooms/"+room),
{
host:username,
joined:false
}
);
roomCode.innerText=room;
show("wait");
watchHost();
};
window.joinRoom=
async()=>{
username=
name.value||"Player";
room=
joinCode
.value
.trim()
.toUpperCase();
if(!room)return;
await set(
ref(
db,
"rooms/"+room+"/joined"
),
true
);
start();
};
async function watchHost(){
let t=
setInterval(
async()=>{
let s=
await get(
ref(
db,
"rooms/"+room+"/joined"
)
);
if(
s.exists()
){
clearInterval(t);
start();
}
},1000);
}
function start(){
show("hub");
const chatRef=
ref(
db,
"rooms/"+room+"/chat"
);
onChildAdded(
chatRef,
snap=>{
const v=
snap.val();
const d=
document
.createElement("div");
d.className=
"msg "+
(
v.user===username
?
"mine"
:
"other"
);
d.innerText=
v.text;
messages
.appendChild(d);
messages
.scrollTop=
999999;
}
);
}
window.sendMsg=
()=>{
if(!msg.value)
return;
push(
ref(
db,
"rooms/"+room+"/chat"
),
{
user:username,
text:msg.value
}
);
msg.value="";
};
window.openGame=
id=>show(id);
window.back=
()=>show("hub");
let score=0;
window.tap=
()=>{
score++;
score.innerText=score;
};
const quizList=[
"Who fell first?",
"Who texts more?",
"Who apologizes first?"
];
window.nextQuiz=
()=>{
quiz.innerText=
quizList[
Math.floor(
Math.random()*quizList.length
)
];
};
const truthList=[
"Say your favorite memory",
"Send 3 hearts",
"What made you smile first?"
];
window.nextTruth=
()=>{
truth.innerText=
truthList[
Math.floor(
Math.random()*truthList.length
)
];
};
</script>
</body>
</html>
