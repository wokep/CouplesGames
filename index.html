<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1,
viewport-fit=cover
">

<title>Couple Hub 💜</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="app">

<!-- HOME -->

<section
id="home"
class="
page
active
">

<div class="hero">

<div class="logo">
💜
</div>

<h1>
Couple Hub
</h1>

<p>
Multiplayer Couple Games
</p>

</div>

<div class="panel">

<input
id="name"
placeholder="Your name">

<button
id="create">
Create Room
</button>

<input
id="joinCode"
placeholder="Room code">

<button
id="join">
Join Room
</button>

</div>

</section>

<!-- WAIT -->

<section
id="wait"
class="page">

<div class="waitBox">

<div class="bear">
🧸
</div>

<div class="title">
Waiting for partner…
</div>

<div
id="roomCode"
class="code">

-----

</div>

<div class="small">

Send this code

</div>

</div>

</section>

<!-- HUB -->

<section
id="hub"
class="page">

<div class="header">

💜 Couple Hub

</div>

<div class="grid">

<button
class="game">
💬 Chat
</button>

<button
class="game">
❤️ Tap Battle
</button>

<button
class="game">
🧠 Who Knows Who
</button>

<button
class="game">
🎨 Draw Together
</button>

<button
class="game">
❌⭕ Tic Tac Toe
</button>

<button
class="game">
🎲 Truth Or Dare
</button>

<button
class="game">
💘 Would You Rather
</button>

<button
class="game">
🐻 Shared Pet
</button>

<button
class="game">
🎵 Music Guess
</button>

<button
class="game">
😂 Finish Sentence
</button>

<button
class="game">
🧩 Memory Match
</button>

<button
class="game">
🏆 Challenges
</button>

</div>

</section>

</div>

<script
type="module"
src="firebase.js">
</script>

<script
type="module"
src="games.js">
</script>

<script
type="module"
src="app.js">
</script>

</body>

</html>
